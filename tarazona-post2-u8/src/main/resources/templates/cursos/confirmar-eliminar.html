<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="es">
<head>
    <meta charset="UTF-8"/>
    <title>Confirmar Eliminación</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 30px; background: #f5f5f5; }
        h1 { color: #c0392b; }
        .container { background: white; padding: 30px; border-radius: 8px;
                     box-shadow: 0 2px 6px rgba(0,0,0,0.1); max-width: 480px; }
        .advertencia { background: #fff3cd; border-left: 4px solid #e67e22;
                       padding: 14px; border-radius: 4px; margin: 20px 0; }
        .datos { background: #fdf2f2; padding: 15px; border-radius: 4px; margin-bottom: 20px; }
        .datos p { margin: 6px 0; }
        .btn { padding: 9px 18px; border-radius: 4px; cursor: pointer;
               font-size: 14px; border: none; text-decoration: none; display: inline-block; }
        .btn-danger   { background: #7f0000; color: white; }
        .btn-secondary { background: #aaa; color: white; margin-left: 10px; }
        .btn:hover { opacity: 0.85; }
    </style>
</head>
<body>
<div class="container">
    <h1>&#9888; Confirmar Eliminación</h1>

    <div class="advertencia">
        ¿Eliminar este curso? Se eliminarán también todas sus inscripciones.
        <strong>Esta acción no se puede deshacer.</strong>
    </div>

    <div class="datos">
        <p><strong>Curso:</strong> <span th:text="${curso.nombre}"></span></p>
        <p><strong>Créditos:</strong> <span th:text="${curso.creditos}"></span></p>
        <p><strong>Estudiantes inscritos:</strong>
           <span th:text="${#sets.size(curso.estudiantes)}"></span>
        </p>
    </div>

    <form th:action="@{/cursos/eliminar/{id}(id=${curso.id})}" method="post">
        <button type="submit" class="btn btn-danger">&#128465; Sí, eliminar</button>
        <a th:href="@{/cursos}" class="btn btn-secondary">Cancelar</a>
    </form>
</div>
</body>
</html>

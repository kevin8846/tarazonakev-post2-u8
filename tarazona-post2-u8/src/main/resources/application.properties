# =========================================
# Conexión a MySQL
# =========================================
spring.datasource.url=jdbc:mysql://localhost:3306/estudiantes_db?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=appuser
spring.datasource.password=apppass
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# =========================================
# JPA / Hibernate
# =========================================
# update: crea/actualiza tablas automáticamente (solo para desarrollo)
# En producción usar: validate o none
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.database-platform=org.hibernate.dialect.MySQL8Dialect

# =========================================
# Servidor
# =========================================
server.port=8080

# =========================================
# Mensajes de error amigables en Thymeleaf
# =========================================
spring.thymeleaf.cache=false

<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="es">
<head>
    <meta charset="UTF-8"/>
    <title th:text="${titulo}">Formulario Curso</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 30px; background: #f5f5f5; }
        h1 { color: #c0392b; }
        .container { background: white; padding: 30px; border-radius: 8px;
                     box-shadow: 0 2px 6px rgba(0,0,0,0.1); max-width: 480px; }
        .form-group { margin-bottom: 18px; }
        label { display: block; font-weight: bold; margin-bottom: 5px; color: #444; }
        input[type=text], input[type=number] {
            width: 100%; padding: 9px 10px; border: 1px solid #ccc;
            border-radius: 4px; font-size: 14px; box-sizing: border-box; }
        input:focus { border-color: #c0392b; outline: none; }
        .error { color: #c0392b; font-size: 13px; margin-top: 4px; display: block; }
        .btn { padding: 9px 18px; border-radius: 4px; cursor: pointer;
               font-size: 14px; border: none; text-decoration: none; }
        .btn-primary   { background: #c0392b; color: white; }
        .btn-secondary { background: #aaa; color: white; margin-left: 10px; }
        .btn:hover { opacity: 0.85; }
    </style>
</head>
<body>
<div class="container">
    <h1 th:text="${titulo}">Formulario</h1>

    <form th:action="@{/cursos/guardar}" th:object="${curso}" method="post">
        <input type="hidden" th:field="*{id}"/>

        <!-- Nombre del curso -->
        <div class="form-group">
            <label for="nombre">Nombre del curso *</label>
            <input type="text" id="nombre" th:field="*{nombre}"
                   placeholder="Ej: Programación Web"/>
            <span class="error"
                  th:if="${#fields.hasErrors('nombre')}"
                  th:errors="*{nombre}">
            </span>
        </div>

        <!-- Créditos -->
        <div class="form-group">
            <label for="creditos">Créditos *</label>
            <input type="number" id="creditos" th:field="*{creditos}"
                   min="1" max="10" placeholder="Ej: 3"/>
            <span class="error"
                  th:if="${#fields.hasErrors('creditos')}"
                  th:errors="*{creditos}">
            </span>
        </div>

        <div>
            <button type="submit" class="btn btn-primary">&#128190; Guardar</button>
            <a th:href="@{/cursos}" class="btn btn-secondary">Cancelar</a>
        </div>
    </form>
</div>
</body>
</html>
